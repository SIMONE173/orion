<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=1920, initial-scale=1" />
<title>ORION — Trailer ufficiale</title>
<style>
  /* ════════════════════════════════════════════════════════════════════
     ORION — TRAILER UFFICIALE (identità REALE, testi in italiano).
     Tutto è funzione di un solo orologio T (ms): render deterministico
     frame-by-frame + sync audio. Identità 1:1: #05070d, nucleo cyan, glass.
     ════════════════════════════════════════════════════════════════════ */
  :root { color-scheme: dark; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1920px; height: 1080px; overflow: hidden; background: #05070d; color: #e6edf6;
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  #stage { position: relative; width: 1920px; height: 1080px; overflow: hidden; }
  #ambient { position: absolute; inset: 0; pointer-events: none;
    background:
      radial-gradient(1200px 800px at 50% -10%, rgba(56,232,255,0.10), transparent 60%),
      radial-gradient(900px 700px at 100% 110%, rgba(99,102,241,0.10), transparent 55%),
      #05070d; }
  #world { position: absolute; inset: 0; }
  .scene { position: absolute; inset: 0; display: grid; place-items: center; will-change: opacity; }
  .cam { position: absolute; inset: 0; display: grid; place-items: center; will-change: transform; }

  /* nucleo (riproduzione fedele di OrionCore) */
  .orion-core { position: relative; display: grid; place-items: center; border-radius: 9999px; }
  .orion-core .ring { position: absolute; inset: 0; border-radius: 9999px; border: 1px solid rgba(56,232,255,0.35); }
  .orion-core .ring.r2 { inset: 10%; opacity: 0.6; } .orion-core .ring.r3 { inset: 18%; opacity: 0.4; }
  .orion-core .halo { position: absolute; inset: -12%; border-radius: 9999px;
    background: radial-gradient(circle, rgba(56,232,255,0.18), transparent 65%); }
  .orion-core .nucleus { position: absolute; inset: 22%; border-radius: 9999px;
    background: radial-gradient(circle at 35% 30%, #9af4ff, #38e8ff 35%, #0b7d92 75%, #053842);
    box-shadow: 0 0 30px rgba(56,232,255,0.55), 0 0 80px rgba(56,232,255,0.25), inset 0 0 24px rgba(255,255,255,0.35); }

  .glass { background: rgba(255,255,255,0.045); border: 1px solid rgba(255,255,255,0.09);
    -webkit-backdrop-filter: blur(14px); backdrop-filter: blur(14px); border-radius: 18px; }
  .label { font-size: 13px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.3em; color: rgba(125,228,255,0.72); }
  .mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
  .cine-text { text-align: center; line-height: 1.12; }
  .cine-text .l1 { font-size: 62px; font-weight: 200; letter-spacing: -0.01em; color: #eaf6ff; }
  .cine-text .l2 { font-size: 62px; font-weight: 200; letter-spacing: -0.01em; color: #7fe9ff; }

  .bar { position: absolute; left: 0; right: 0; height: 88px; background: #000; z-index: 50; pointer-events: none; }
  .bar.top { top: 0; } .bar.bot { bottom: 0; }
  #vignette { position: absolute; inset: 0; z-index: 45; pointer-events: none;
    background: radial-gradient(120% 120% at 50% 50%, transparent 55%, rgba(0,0,0,0.55) 100%); }
  #grain { position: absolute; inset: -50px; z-index: 46; pointer-events: none; opacity: 0.05; mix-blend-mode: overlay;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>"); }

  .panel { padding: 26px 28px; }
  .panel h3 { font-size: 20px; font-weight: 600; letter-spacing: -0.01em; color: #c9f3ff; margin-bottom: 16px; }
  .chip { border-radius: 12px; border: 1px solid rgba(255,255,255,0.08); background: rgba(255,255,255,0.02); padding: 12px 14px; }
  .chip .k { font-size: 11px; text-transform: uppercase; letter-spacing: 0.14em; color: #6f7d92; }
  .chip .v { margin-top: 4px; font-size: 15px; color: #d6e2f0; }
  .sweep { position: absolute; inset: 0; border-radius: inherit; pointer-events: none; overflow: hidden; }
  .sweep > i { position: absolute; top: -10%; bottom: -10%; width: 40%;
    background: linear-gradient(105deg, transparent, rgba(255,255,255,0.10), transparent); }

  /* ── barra comando vocale (come si usa: parli → ORION agisce) ── */
  .voice { display: inline-flex; align-items: center; gap: 16px; padding: 12px 22px; border-radius: 9999px;
    background: rgba(8,18,26,0.6); border: 1px solid rgba(56,232,255,0.28); -webkit-backdrop-filter: blur(12px); backdrop-filter: blur(12px); }
  .voice .vmic { width: 26px; height: 26px; flex: none; }
  .voice .wave { display: flex; align-items: center; gap: 3px; height: 26px; }
  .voice .wave i { width: 3px; border-radius: 3px; background: #7fe9ff; height: 6px; }
  .voice .vtext { font-size: 20px; color: #dff1fb; font-weight: 300; white-space: nowrap; }
  .voice .caret { display: inline-block; width: 2px; height: 20px; margin-left: 2px; background: #7fe9ff; vertical-align: -3px; }

  /* ── desktop (scena gesti) ── */
  .desk { position: absolute; inset: 0; overflow: hidden;
    background: radial-gradient(1100px 700px at 30% 20%, rgba(56,232,255,0.08), transparent 60%),
                radial-gradient(900px 800px at 85% 90%, rgba(99,102,241,0.10), transparent 60%),
                linear-gradient(160deg, #060a12, #04060c); }
  .menubar { position: absolute; top: 0; left: 0; right: 0; height: 30px; display: flex; align-items: center; gap: 20px;
    padding: 0 22px; font-size: 13px; color: rgba(220,232,245,0.75);
    background: rgba(8,12,20,0.55); -webkit-backdrop-filter: blur(18px); backdrop-filter: blur(18px); border-bottom: 1px solid rgba(255,255,255,0.06); }
  .menubar .mi { opacity: 0.8; } .menubar .right { margin-left: auto; display: flex; gap: 16px; opacity: 0.8; }
  .dock { position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%); display: flex; gap: 14px; padding: 10px 16px;
    border-radius: 22px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.10); -webkit-backdrop-filter: blur(20px); backdrop-filter: blur(20px); }
  .dock .di { width: 48px; height: 48px; border-radius: 13px; box-shadow: inset 0 1px 0 rgba(255,255,255,0.25), 0 6px 16px rgba(0,0,0,0.4); }
  .win { position: absolute; border-radius: 14px; overflow: hidden; will-change: transform;
    background: rgba(16,22,32,0.72); border: 1px solid rgba(255,255,255,0.10); -webkit-backdrop-filter: blur(10px); backdrop-filter: blur(10px);
    box-shadow: 0 24px 60px rgba(0,0,0,0.5); }
  .win .tb { height: 32px; display: flex; align-items: center; gap: 7px; padding: 0 12px; background: rgba(255,255,255,0.05); }
  .win .tb .d { width: 11px; height: 11px; border-radius: 9px; }
  .win .tb .t { margin-left: 8px; font-size: 12px; color: #b9c6d6; letter-spacing: .02em; }
  .win .body { padding: 16px; }
  .win .ln { height: 9px; border-radius: 6px; background: rgba(255,255,255,0.08); margin: 11px 0; }
  .hand { position: absolute; width: 46px; height: 46px; transform: translate(-50%,-50%); pointer-events: none; z-index: 40;
    filter: drop-shadow(0 0 14px rgba(56,232,255,0.55)); }
  .ghint { position: absolute; left: 50%; bottom: 110px; transform: translateX(-50%); display: inline-flex; align-items: center; gap: 12px;
    padding: 11px 20px; border-radius: 9999px; background: rgba(8,18,26,0.66); border: 1px solid rgba(56,232,255,0.3); font-size: 19px; color: #dff1fb; }
</style>
</head>
<body>
<div id="stage">
  <div id="ambient"></div>
  <div id="world"></div>
  <div id="grain"></div>
  <div id="vignette"></div>
  <div class="bar top"></div>
  <div class="bar bot"></div>
</div>

<script>
const W = 1920, H = 1080;
const world = document.getElementById('world');
const grain = document.getElementById('grain');
const clamp01 = x => x < 0 ? 0 : x > 1 ? 1 : x;
const lerp = (a,b,t) => a + (b-a)*t;
const smooth = t => { t = clamp01(t); return t*t*(3-2*t); };
const ease = t => { t = clamp01(t); return 1-Math.pow(1-t,3); };
const easeIO = t => { t = clamp01(t); return t<0.5 ? 4*t*t*t : 1-Math.pow(-2*t+2,3)/2; };
const seg = (p,a,b) => clamp01((p-a)/(b-a));
const PI = Math.PI;

function coreHTML(){ return `<div class="orion-core" style="width:100%;height:100%"><div class="halo"></div>
  <div class="ring r1"></div><div class="ring r2"></div><div class="ring r3"></div><div class="nucleus"></div></div>`; }
function driveCore(el, T, intensity, ignite){
  intensity = clamp01(intensity); ignite = clamp01(ignite||0);
  const halo = el.querySelector('.halo'), nuc = el.querySelector('.nucleus'), rings = el.querySelectorAll('.ring');
  const breathe = 1 + (0.045 + 0.075*intensity) * Math.sin(T/(700 - 300*intensity));
  const sz = el.offsetWidth || 240;
  nuc.style.transform = `scale(${breathe})`;
  const glow = 0.55 + 0.5*intensity + 1.4*ignite;
  nuc.style.boxShadow = `0 0 ${30*(sz/240)*(1+0.6*ignite)}px rgba(56,232,255,${glow}), 0 0 ${80*(sz/240)*(1+1.2*ignite)}px rgba(56,232,255,${0.25+0.45*intensity+0.7*ignite}), inset 0 0 24px rgba(255,255,255,${0.35+0.4*ignite})`;
  nuc.style.filter = `brightness(${1+0.9*ignite}) saturate(${1+0.3*ignite})`;
  halo.style.opacity = (0.5 + 0.4*intensity + 0.6*ignite).toFixed(3);
  halo.style.transform = `scale(${1+0.12*intensity+0.5*ignite})`;
  const s = T/120 * (0.5 + intensity);
  rings[0].style.transform = `rotate(${s}deg)`; rings[1].style.transform = `rotate(${-s*0.7}deg)`; rings[2].style.transform = `rotate(${s*1.3}deg)`;
  rings.forEach(r=>{ r.style.borderColor = `rgba(56,232,255,${0.30+0.4*intensity})`; });
}
function reveal(el, lp){ lp = clamp01(lp); const e = ease(lp); const b = el.dataset.base ? el.dataset.base+' ' : '';
  el.style.opacity = smooth(lp/0.6); el.style.transform = `${b}translateY(${(1-e)*22}px) scale(${0.94+0.06*e})`; el.style.filter = `blur(${(1-smooth(lp/0.55))*8}px)`; }
function base(el, t){ el.dataset.base = t; return el; }
function sweep(el, lp){ const i = el.querySelector('.sweep > i'); if(!i) return;
  const x = lerp(-50, 150, ease(clamp01((lp-0.05)/0.5))); i.style.transform = `translateX(${x*4}px) skewX(-12deg)`; i.style.opacity = lp>0.02 && lp<0.65 ? 1 : 0; }
function el(tag, cls, html){ const e=document.createElement(tag); if(cls)e.className=cls; if(html!=null)e.innerHTML=html; return e; }
function glassPanel(title, inner){ const p=el('div','glass panel'); p.innerHTML = `<div class="sweep"><i></i></div>` + (title?`<h3>${title}</h3>`:'') + inner; return p; }
function cineText(l1, l2){ const c=el('div','cine-text'); c.dataset.base='translateX(-50%)'; c.innerHTML = `<div class="l1">${l1}</div>` + (l2?`<div class="l2">${l2}</div>`:''); return c; }

// barra comando vocale: micro + onda + testo che si "scrive"
const MIC = `<svg class="vmic" viewBox="0 0 24 24" fill="none" stroke="#7fe9ff" stroke-width="1.6"><rect x="9" y="3" width="6" height="11" rx="3"/><path d="M6 11a6 6 0 0 0 12 0"/><line x1="12" y1="17" x2="12" y2="21"/><line x1="9" y1="21" x2="15" y2="21"/></svg>`;
function voiceBar(text){ const w=el('div','voice'); w._text=text; w.innerHTML = MIC + `<div class="wave">${Array.from({length:16}).map(()=>'<i></i>').join('')}</div><div class="vtext"></div><span class="caret"></span>`; return w; }
function driveVoice(w, lp, T){
  const bars = w.querySelectorAll('.wave i');
  bars.forEach((b,i)=>{ const a = (lp>0.02 && lp<0.98) ? 1 : 0.25; b.style.height = (6 + a*16*Math.abs(Math.sin(T/130 + i*0.7))).toFixed(1)+'px'; b.style.opacity = 0.5+0.5*a; });
  const n = Math.floor(clamp01((lp-0.05)/0.45) * w._text.length);
  w.querySelector('.vtext').textContent = w._text.slice(0, n);
  w.querySelector('.caret').style.opacity = (Math.floor(T/420)%2 && lp<0.98) ? 1 : 0;
}

// ── TIMELINE ───────────────────────────────────────────────────────────────
const FADE = 750; let cursor = 0; const SC = {};
function scene(name, dur, build){
  const t0 = cursor, t1 = cursor + dur;
  const root = el('div','scene'); root.style.opacity=0; root.style.display='none';
  const cam = el('div','cam'); root.appendChild(cam);
  const api = build(cam); world.appendChild(root);
  SC[name] = { t0, t1, dur, root, cam, update: api && api.update };
  cursor = t1 - FADE; return SC[name];
}
let NOW = 0;
const opOf = s => { const T=NOW; if (T<=s.t0-FADE || T>=s.t1+FADE) return 0; if (T<s.t0) return smooth((T-(s.t0-FADE))/FADE); if (T>s.t1) return smooth(1-(T-s.t1)/FADE); return 1; };
const prOf = s => clamp01((NOW - s.t0)/(s.t1 - s.t0));

// ════════════════════════════════════════════════════════════════════════
//  SCENE
// ════════════════════════════════════════════════════════════════════════

/* 1 · IL CAOS */
scene('chaos', 14000, (cam)=>{
  const field = el('div'); field.style.cssText='position:absolute;inset:0;'; cam.appendChild(field);
  const apps = ['Mail','Calendario','Fattura_04.pdf','CRM','Slack','Foglio.xlsx','Contratto.docx','Zoom','Drive','Note','Attività','Report.pdf','Banca','ERP','Chat','Preventivo'];
  const R = (s)=>{ let x = Math.sin(s*99.13)*43758.5453; return x-Math.floor(x); };
  const wins = [];
  for(let i=0;i<16;i++){ const w = el('div','glass'); const ww=230+R(i)*150, hh=150+R(i+9)*120;
    const cx=lerp(160,W-160-ww,R(i+1)), cy=lerp(150,H-200-hh,R(i+2));
    w.style.cssText=`position:absolute;width:${ww}px;height:${hh}px;left:${cx}px;top:${cy}px;border-radius:12px;overflow:hidden;`;
    w.innerHTML=`<div style="height:26px;background:rgba(255,255,255,0.05);display:flex;align-items:center;gap:6px;padding:0 10px;">
      <span style="width:8px;height:8px;border-radius:9px;background:#ff5f57"></span><span style="width:8px;height:8px;border-radius:9px;background:#febc2e"></span><span style="width:8px;height:8px;border-radius:9px;background:#28c840"></span>
      <span style="margin-left:8px;font-size:11px;color:#8a98ad;letter-spacing:.04em">${apps[i]}</span></div>
      <div style="padding:12px;">${Array.from({length:3+Math.floor(R(i+5)*3)}).map((_,k)=>`<div style="height:7px;border-radius:6px;margin:9px 0;background:rgba(255,255,255,${0.05+0.04*R(i+k)});width:${40+R(i+k+3)*55}%"></div>`).join('')}</div>`;
    field.appendChild(w); wins.push({el:w,x:cx,y:cy}); }
  const badges=[]; for(let i=0;i<10;i++){ const b=el('div'); b.style.cssText=`position:absolute;min-width:22px;height:22px;border-radius:11px;background:#ff3b30;color:#fff;font-size:12px;font-weight:700;display:grid;place-items:center;box-shadow:0 4px 14px rgba(255,59,48,.5);padding:0 6px;`; b.textContent=1+Math.floor(R(i+20)*9); field.appendChild(b); badges.push(b); }
  const cap = cineText('Il lavoro è diventato','troppo complicato.'); cap.style.cssText='position:absolute;left:50%;bottom:140px;transform:translateX(-50%);z-index:5;'; cam.appendChild(cap);
  return { update(p,T){
    wins.forEach((w,i)=>{ const ap=clamp01((p*16-i)*1.4); const jx=Math.sin(T/90+i)*1.6*ap, jy=Math.cos(T/110+i*2)*1.4*ap; w.el.style.opacity=ap; w.el.style.transform=`translate(${jx}px,${jy}px) scale(${0.9+0.1*ease(ap)})`; });
    badges.forEach((b,i)=>{ const w=wins[(i+3)%wins.length]; const pop=clamp01((p*16-(i+4))*2.2); b.style.left=(w.x+w.el.offsetWidth-14)+'px'; b.style.top=(w.y-8)+'px'; b.style.opacity=pop; b.style.transform=`scale(${pop*(1+0.15*Math.abs(Math.sin(T/200+i)))})`; });
    cam.style.transform=`scale(${1.0+0.06*p}) translateY(${-6*p}px)`;
    reveal(cap,(p-0.45)/0.18);
  }};
});

/* 2 · ARRIVA ORION */
scene('arrive', 15000, (cam)=>{
  const line=el('div'); line.style.cssText=`position:absolute;left:0;top:50%;height:2px;width:100%;background:#9af4ff;box-shadow:0 0 40px 8px rgba(56,232,255,0.85);transform-origin:50% 50%;`; cam.appendChild(line);
  const coreWrap=el('div'); coreWrap.style.cssText='width:300px;height:300px;'; coreWrap.innerHTML=coreHTML(); cam.appendChild(coreWrap); const core=coreWrap.firstElementChild;
  const verbs=['osserva','analizza','capisce'];
  const vEls=verbs.map((v)=>{ const e=el('div','label',v); e.style.cssText=`position:absolute;left:50%;top:50%;font-size:20px;letter-spacing:.32em;`; cam.appendChild(e); return e; });
  const cap=cineText('Capisce.','Prima di agire.'); cap.style.cssText='position:absolute;left:50%;bottom:140px;transform:translateX(-50%);'; cam.appendChild(cap);
  return { update(p,T){
    const flash=p<0.14; line.style.opacity=flash?smooth(p/0.05)*(1-smooth((p-0.06)/0.06)):0; line.style.transform=`scaleX(${ease(clamp01(p/0.08))})`;
    const born=clamp01((p-0.07)/0.16); coreWrap.style.opacity=born; coreWrap.style.transform=`scale(${lerp(0.55,1,ease(born))})`;
    driveCore(core,T, lerp(0,0.55,clamp01((p-0.18)/0.3))+(p>0.55?0.25:0), p<0.2?ease(clamp01((p-0.07)/0.08)):0);
    vEls.forEach((e,i)=>{ const s0=0.30+i*0.13; const lp=clamp01((p-s0)/0.16); const ang=-PI/2+i*(2*PI/3)+T/2200; const rad=lerp(330,70,ease(lp));
      e.style.transform=`translate(-50%,-50%) translate(${Math.cos(ang)*rad}px,${Math.sin(ang)*rad}px) scale(${lerp(1,0.4,ease(lp))})`; e.style.opacity=smooth(lp/0.25)*(1-smooth((lp-0.7)/0.3)); e.style.color=`rgba(125,228,255,${0.6+0.4*lp})`; });
    cam.style.transform=`scale(${1.05-0.05*ease(p)})`; reveal(cap,(p-0.7)/0.16);
  }};
});

/* 3 · COME SI USA — BRIEFING A VOCE (parli → ORION agisce) */
scene('briefing', 16000, (cam)=>{
  const vb=voiceBar('«Ehi ORION, com’è la mia giornata?»'); vb.style.cssText='position:absolute;left:50%;top:120px;transform:translateX(-50%);'; cam.appendChild(vb);
  const grid=el('div'); grid.style.cssText='display:grid;grid-template-columns:auto 1fr;align-items:center;gap:70px;width:1280px;margin-top:60px;'; cam.appendChild(grid);
  const coreWrap=el('div'); coreWrap.style.cssText='width:180px;height:180px;'; coreWrap.innerHTML=coreHTML(); grid.appendChild(coreWrap); const core=coreWrap.firstElementChild;
  const right=el('div'); right.style.cssText='max-width:760px;'; grid.appendChild(right);
  right.appendChild(el('div','label','BUONGIORNO · OGGI'));
  const head=el('div'); head.style.cssText='margin-top:6px;font-size:30px;font-weight:200;color:#eaf6ff;'; head.textContent='Tre cose, prima di iniziare.'; right.appendChild(head);
  const list=el('div'); list.style.cssText='margin-top:22px;display:flex;flex-direction:column;gap:12px;'; right.appendChild(list);
  const items=[['09:00','Bianchi aspetta da 5 giorni — meglio rispondere oggi.'],['11:30','Riunione di domani — materiale già pronto.'],['VEN','Conflitto in agenda venerdì — soluzione pronta.']];
  const cards=items.map(([t,m])=>{ const c=el('div','glass'); c.style.cssText='display:flex;align-items:center;gap:16px;padding:16px 20px;border-radius:14px;'; c.innerHTML=`<div class="sweep"><i></i></div><div class="mono" style="font-size:13px;color:#7fe9ff;width:48px;flex:none">${t}</div><div style="font-size:18px;color:#d9e6f4">${m}</div>`; list.appendChild(c); return c; });
  const btn=el('div'); btn.style.cssText='margin-top:24px;display:inline-block;background:rgba(34,211,238,0.9);color:#04222b;font-weight:600;font-size:16px;padding:13px 26px;border-radius:13px;'; btn.textContent='Conferma'; right.appendChild(btn);
  return { update(p,T){
    driveVoice(vb, seg(p,0.02,0.30), T); vb.style.opacity = smooth(seg(p,0.02,0.1))*(1-smooth(seg(p,0.85,1)));
    driveCore(core,T, p>0.32?0.8:0.4, 0);
    reveal(right.children[0],(p-0.30)/0.1); reveal(head,(p-0.36)/0.12);
    cards.forEach((c,i)=>{ const lp=(p-(0.44+i*0.12))/0.14; reveal(c,lp); sweep(c,lp); });
    reveal(btn,(p-0.84)/0.14);
    cam.style.transform=`scale(${1.0+0.03*ease(p)})`;
  }};
});

/* 4 · MEMORIA */
scene('memory', 14000, (cam)=>{
  const wrap=el('div'); wrap.style.cssText='position:relative;width:1320px;height:620px;'; cam.appendChild(wrap);
  const center=el('div','glass'); center.style.cssText='position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);padding:18px 26px;border-radius:16px;text-align:center;z-index:3;border-color:rgba(56,232,255,0.3);background:rgba(34,211,238,0.06);';
  center.innerHTML=`<div class="sweep"><i></i></div><div class="label">CLIENTE</div><div style="margin-top:6px;font-size:26px;font-weight:300;color:#eaf6ff">Marco Rossi</div>`; base(center,'translate(-50%,-50%)'); wrap.appendChild(center);

    orb.forEach((e,i)=>{ const a=spin+i*(2*PI/fns.length); const r=lerp(120,300,smooth(clamp01(p/0.5))); e.style.transform=`translate(-50%,-50%) translate(${Math.cos(a)*r}px,${Math.sin(a)*r*0.62}px)`; e.style.opacity=clamp01((p-(0.06+i*0.04))/0.12)*(0.7+0.3*Math.sin(a)); });
    mini.forEach((e,i)=>{ const a=-spin*0.6+i*(2*PI/8)+0.4; const r=lerp(160,470,smooth(clamp01(p/0.55))); e.style.transform=`translate(-50%,-50%) translate(${Math.cos(a)*r}px,${Math.sin(a)*r*0.6}px) scale(${0.8+0.2*Math.sin(a)})`; e.style.opacity=clamp01((p-(0.1+i*0.03))/0.12)*(0.25+0.25*Math.sin(a+1)); });
    wrap.style.transform=`scale(${lerp(0.95,1.0,ease(p)) * (p>0.82? lerp(1,0.86,(p-0.82)/0.18):1)})`; cam.style.transform=`scale(${lerp(1,1.05,ease(p))})`;
    reveal(cap,(p-0.55)/0.16); if(p>0.82) cap.style.opacity=lerp(1,0,(p-0.82)/0.18);
  }};
});

/* FINALE */
scene('finale', 17000, (cam)=>{
  const coreWrap=el('div'); coreWrap.style.cssText='width:190px;height:190px;'; coreWrap.innerHTML=coreHTML(); cam.appendChild(coreWrap); const core=coreWrap.firstElementChild;
  const logo=el('div'); logo.style.cssText='position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);text-align:center;'; cam.appendChild(logo);
  logo.innerHTML=`<div style="font-size:84px;font-weight:600;letter-spacing:0.42em;color:#eaf6ff;text-indent:0.42em;opacity:0" class="L1">ORION</div>
    <div style="margin-top:18px;font-size:20px;font-weight:300;letter-spacing:0.06em;color:#bcd0e2;opacity:0" class="L2">Il sistema operativo del lavoro moderno.</div>`;
  const L1=logo.querySelector('.L1'), L2=logo.querySelector('.L2');
  return { update(p,T){
    const ignite=smooth((p-0.16)/0.2)*(1-smooth((p-0.42)/0.12)*0.4); driveCore(core,T,0.5+0.5*smooth(p/0.3),ignite);
    const dis=smooth((p-0.40)/0.14); coreWrap.style.opacity=lerp(1,0,dis); coreWrap.style.transform=`scale(${lerp(1,0.4,dis)})`;
    L1.style.opacity=smooth((p-0.46)/0.14); L1.style.transform=`scale(${lerp(1.06,1,ease(clamp01((p-0.46)/0.2)))})`; L1.style.letterSpacing=`${lerp(0.62,0.42,ease(clamp01((p-0.46)/0.3)))}em`;
    L2.style.opacity=smooth((p-0.62)/0.14);
    const end=smooth((p-0.9)/0.1); logo.style.filter=`brightness(${lerp(1,0,end)})`; coreWrap.style.filter=`brightness(${lerp(1,0,end)})`;
    cam.style.transform=`scale(${lerp(1,1.02,ease(p))})`;
  }};
});

const TOTAL = cursor + FADE; window.__total = TOTAL;

const flash=el('div'); flash.style.cssText='position:absolute;inset:0;z-index:48;background:#dffaff;opacity:0;pointer-events:none;'; document.getElementById('stage').appendChild(flash);

function render(T){
  NOW=T;
  for(const k in SC){ const s=SC[k]; const op=opOf(s);
    if(op<=0){ if(s.root.style.display!=='none') s.root.style.display='none'; continue; }
    if(s.root.style.display==='none') s.root.style.display='grid';
    s.root.style.opacity=op; if(s.update) s.update(prOf(s),T); }
  const gj=(Math.sin(T*12.9898)*43758.5453); grain.style.transform=`translate(${(gj%1)*20-10}px, ${((gj*1.3)%1)*20-10}px)`;
  let fl=0; const a=SC.arrive, f=SC.finale;
  if(T>a.t0 && T<a.t0+1600){ const x=(T-a.t0-900)/250; fl=Math.max(fl,Math.exp(-x*x)*0.5); }
  if(T>f.t0){ const c=(T-(f.t0+f.dur*0.30))/220; fl=Math.max(fl,Math.exp(-c*c)*0.85); }
  flash.style.opacity=fl;
}
window.__setT=(T)=>{ render(Math.max(0,Math.min(TOTAL,T))); };
window.__t=0;
if(!new URLSearchParams(location.search).has('still')){
  let start=null; function loop(ts){ if(start==null)start=ts; const T=(ts-start)%(TOTAL+1500); window.__t=T; render(T); requestAnimationFrame(loop); } requestAnimationFrame(loop);
} else { render(0); }
console.log('ORION trailer ready · total', (TOTAL/1000).toFixed(1),'s');
</script>
